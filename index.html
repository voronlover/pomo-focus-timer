<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ZenPomo</title>
  <meta name="description" content="A sleek Pomodoro focus timer with tasks, stats, and an original anime-inspired completion jingle.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body data-mode="pomodoro">
  <div class="page-shell">
    <header class="topbar">
      <a class="brand" href="." aria-label="PomoFocus Clone home">
        <span class="brand-dot"></span>
        <span>ZenPomo</span>
      </a>
      <nav class="top-actions" aria-label="Toolbar">
        <button id="themeBtn" class="ghost" type="button" aria-label="Toggle dark mode">DARK</button>
        <button id="reportBtn" class="ghost" type="button">REPORT</button>
        <button id="settingsBtn" class="ghost" type="button">SETTINGS</button>
      </nav>
    </header>

    <main>
      <section class="hero" aria-labelledby="modeTitle">
        <div class="lab-grid">
          <aside class="signal-panel" aria-label="Focus signal visualization">
            <div class="scanline-art">
              <span></span><span></span><span></span><span></span><span></span>
            </div>
            <p>ATTENTION WINDOW</p>
            <small id="seedText">SEED: 0000000000</small>
          </aside>

          <div class="timer-card">
          <div class="tabs" role="tablist" aria-label="Timer mode">
            <button class="tab active" type="button" role="tab" aria-selected="true" data-mode="pomodoro">Pomodoro</button>
            <button class="tab" type="button" role="tab" aria-selected="false" data-mode="short">Short Break</button>
            <button class="tab" type="button" role="tab" aria-selected="false" data-mode="long">Long Break</button>
          </div>

          <h1 id="modeTitle" class="sr-only">Pomodoro timer</h1>
          <div id="timeDisplay" class="time" aria-live="polite">25:00</div>

          <div class="timer-actions">
            <button id="startBtn" class="primary" type="button">START</button>
            <button id="resetBtn" class="icon-button" type="button" title="Reset timer" aria-label="Reset timer">↻</button>
          </div>
          </div>
        </div>

        <p id="roundText" class="round">#1 Time to focus!</p>
        <div class="stats-grid" aria-label="Usage stats">
          <div class="stat-pill">
            <span id="pressCount">0</span>
            <small>starts on this browser</small>
          </div>
          <div class="stat-pill">
            <span id="completedCount">0</span>
            <small>completed sessions</small>
          </div>
          <div class="stat-pill">
            <span id="ipLabel">local</span>
            <small>tracking scope</small>
          </div>
        </div>
      </section>

      <section class="tasks" aria-labelledby="tasksTitle">
        <div class="section-heading">
          <h2 id="tasksTitle">Tasks</h2>
          <button id="clearDoneBtn" class="ghost dark" type="button">Clear done</button>
        </div>

        <form id="taskForm" class="task-form">
          <input id="taskInput" type="text" placeholder="What are you working on?" autocomplete="off" maxlength="120" required>
          <button type="submit">Add Task</button>
        </form>

        <ul id="taskList" class="task-list" aria-label="Task list"></ul>
      </section>
    </main>
  </div>

  <dialog id="settingsDialog" class="settings-dialog">
    <form method="dialog" class="settings-panel">
      <div class="modal-header">
        <h2>Timer Settings</h2>
        <button class="close" value="cancel" aria-label="Close settings">×</button>
      </div>

      <div class="setting-grid">
        <label>
          Pomodoro
          <input id="pomodoroMinutes" type="number" min="1" max="180" step="1">
        </label>
        <label>
          Short Break
          <input id="shortMinutes" type="number" min="1" max="60" step="1">
        </label>
        <label>
          Long Break
          <input id="longMinutes" type="number" min="1" max="90" step="1">
        </label>
        <label>
          Long break every
          <input id="longEvery" type="number" min="2" max="12" step="1">
        </label>
      </div>

      <label class="toggle-row">
        <span>Auto-start breaks</span>
        <input id="autoBreaks" type="checkbox">
      </label>

      <label class="toggle-row">
        <span>Desktop notifications</span>
        <input id="notifications" type="checkbox">
      </label>

      <menu class="modal-actions">
        <button id="saveSettings" class="primary small" value="default">Save</button>
      </menu>
    </form>
  </dialog>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script src="app.js"></script>
</body>
</html>
